<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>打卡本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--paper:#f5f0e8;--ink:#2c2416;--ink-light:#6b5c42;--ink-faint:#b0a090;--gold:#c9942a;--green:#4a7c59;--rule:#d4c9b4}*{box-sizing:border-box;margin:0;padding:0}html{-webkit-text-size-adjust:100%;touch-action:manipulation}button,a,.habit-card,.cal-day,.emoji-opt,.color-opt{touch-action:manipulation}body{background:#d4c8b0;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(0,0,0,.015) 40px,rgba(0,0,0,.015) 41px);min-height:100vh;font-family:'Noto Serif SC',serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:40px 20px}.book{width:100%;max-width:480px;background:var(--paper);border-radius:4px 12px 12px 4px;box-shadow:-6px 0 0 #b8a888,-10px 0 0 #a89870,0 8px 40px rgba(0,0,0,.25),inset 0 0 80px rgba(200,180,140,.15);position:relative;overflow:hidden}.book:before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(transparent,transparent 31px,var(--rule) 31px,var(--rule) 32px);opacity:.48;pointer-events:none;z-index:0}.book:after{content:'';position:absolute;left:0;top:0;bottom:0;width:32px;background:linear-gradient(to right,rgba(0,0,0,.08),transparent);pointer-events:none;z-index:1}.header{position:relative;z-index:2;padding:32px 32px 20px;border-bottom:2px solid var(--rule);text-align:center}.header-label{font-family:'Ma Shan Zheng',cursive;font-size:11px;letter-spacing:4px;color:var(--ink-faint);margin-bottom:6px}.header-title{font-family:'Ma Shan Zheng',cursive;font-size:42px;color:var(--ink);line-height:1;position:relative;display:inline-block}.header-title:after{content:'习惯记录';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:11px;font-family:'Lora',serif;font-style:italic;color:var(--ink-faint);letter-spacing:2px;white-space:nowrap}.date-badge{display:inline-block;margin-top:28px;padding:4px 16px;border:1px solid var(--rule);border-radius:20px;font-size:12px;color:var(--ink-light);font-family:'Lora',serif;letter-spacing:1px}#view-home,#view-detail,#view-add{display:none;position:relative;z-index:2}#view-home.active,#view-detail.active,#view-add.active{display:block}.section-label{padding:20px 32px 8px;font-size:10px;letter-spacing:3px;color:var(--ink-faint);text-transform:uppercase;font-family:'Lora',serif}.scroll-area{max-height:60vh;overflow-y:auto}.habit-list{padding:0 20px 8px}.habit-card{display:flex;align-items:center;gap:14px;padding:14px;margin-bottom:6px;border-radius:6px;cursor:pointer;transition:background .15s;border:1px solid transparent}.habit-card:hover{background:rgba(180,160,120,.12);border-color:var(--rule)}.habit-icon-wrap{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1.5px solid}.habit-info{flex:1;min-width:0}.habit-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.habit-sub{font-size:11px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic}.streak-dots{display:flex;gap:3px;margin-top:4px}.streak-dot{width:6px;height:6px;border-radius:50%;background:var(--rule)}.streak-dot.filled{background:var(--gold)}.card-stamp{min-width:36px;height:36px;padding:0 8px;border-radius:18px;border:2.5px solid;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-family:'Lora',serif}.card-stamp.done{border-color:var(--green);color:var(--green);background:rgba(74,124,89,.08)}.card-stamp.undone{border-color:var(--rule);color:var(--rule)}.card-count{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px}.card-count-num{font-family:'Ma Shan Zheng',cursive;font-size:22px;line-height:1}.card-count-unit{font-size:9px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic}.add-btn,.backup-btn{display:flex;align-items:center;gap:10px;margin:12px 20px 8px;padding:12px 16px;border:1.5px dashed var(--rule);border-radius:6px;background:none;cursor:pointer;color:var(--ink-faint);font-family:'Noto Serif SC',serif;font-size:14px;width:calc(100% - 40px);transition:all .15s;text-decoration:none}.backup-btn{margin-top:0;margin-bottom:28px;border-style:solid;justify-content:center;color:var(--ink-light);background:rgba(255,255,255,.28)}.add-btn:hover,.backup-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,148,42,.05)}.add-btn-icon{width:28px;height:28px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1}.back-btn{display:flex;align-items:center;gap:8px;padding:16px 32px 0;background:none;border:none;cursor:pointer;font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-light)}.detail-hero{text-align:center;padding:24px 32px 20px;border-bottom:1px solid var(--rule)}.detail-emoji{font-size:52px;display:block;margin-bottom:10px}.detail-name{font-size:26px;font-weight:700;margin-bottom:4px}.detail-desc{font-size:13px;color:var(--ink-light);font-family:'Lora',serif;font-style:italic}.selected-date-line{margin-top:10px;font-size:12px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic}.checkin-area,.count-area{display:flex;flex-direction:column;align-items:center;padding:28px 32px 20px;gap:12px}.checkin-btn{width:110px;height:110px;border-radius:50%;border:3px solid;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:'Ma Shan Zheng',cursive;font-size:20px;transition:all .25s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}.checkin-btn.done{border-color:var(--green);color:var(--green);box-shadow:0 0 0 6px rgba(74,124,89,.12)}.checkin-btn.undone{color:var(--ink-light)}.checkin-btn-icon{font-size:32px;line-height:1}.checkin-btn-text{font-size:15px}.checkin-status,.single-adjust-note{font-size:12px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic}.single-adjust-row{display:flex;align-items:center;gap:10px}.count-display{display:flex;align-items:center;gap:28px}.count-ctrl-btn{width:56px;height:56px;border-radius:50%;border:2px solid var(--rule);background:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-light);transition:all .2s;font-family:'Lora',serif;line-height:1;user-select:none}.count-ctrl-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,148,42,.06)}.count-ctrl-btn.minus:hover{border-color:#c05050;color:#c05050;background:rgba(192,80,80,.06)}.count-ctrl-btn.small{width:42px;height:42px;font-size:22px}.count-num-wrap{display:flex;flex-direction:column;align-items:center;min-width:90px}.count-num{font-family:'Ma Shan Zheng',cursive;font-size:68px;line-height:1;transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .3s}.count-num.bump{transform:scale(1.25)}.count-goal-label{font-size:11px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic;margin-top:2px}.goal-bar-wrap{width:180px}.goal-bar-track{height:6px;background:var(--rule);border-radius:3px;overflow:hidden;margin-bottom:5px}.goal-bar-fill{height:100%;border-radius:3px;transition:width .3s ease,background .3s}.goal-bar-text{font-size:11px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic;text-align:center;display:block}.stats-row{display:flex;padding:0 32px;margin-bottom:24px}.stat-item{flex:1;text-align:center;padding:12px 0;border:1px solid var(--rule)}.stat-item:first-child{border-radius:6px 0 0 6px}.stat-item:last-child{border-radius:0 6px 6px 0}.stat-num{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--ink);display:block}.stat-label{font-size:10px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic}.calendar-section{padding:0 32px 32px}.calendar-title{font-size:10px;letter-spacing:3px;color:var(--ink-faint);text-transform:uppercase;font-family:'Lora',serif;margin-bottom:14px}.calendar-title-row{display:flex;align-items:center;justify-content:space-between}.month-nav{border:1px solid var(--rule);background:none;color:var(--ink-light);border-radius:50%;width:26px;height:26px;cursor:pointer;font-family:'Lora',serif;font-size:15px;line-height:1}.month-nav:disabled{opacity:.3;cursor:not-allowed}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Lora',serif;color:var(--ink-faint);position:relative;transition:all .2s}.cal-day.checked{background:var(--green);color:white}.cal-day.partial{background:rgba(74,124,89,.28);color:var(--green)}.cal-day.today-dot{border:1.5px solid var(--gold);color:var(--gold)}.cal-day.today-dot.checked{border-color:var(--green);color:white}.cal-day.clickable{cursor:pointer}.cal-day.clickable:hover{transform:scale(1.12);border-color:var(--gold)}.cal-day.selected{outline:2px solid var(--gold);outline-offset:2px}.cal-day.future{opacity:.35;cursor:not-allowed}.cal-cnt{position:absolute;top:-2px;right:-2px;background:var(--gold);color:white;font-size:7px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-weight:bold}.divider{height:1px;background:var(--rule);margin:0 32px}.delete-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 32px 32px;padding:10px;width:calc(100% - 64px);border:1px solid #e8c0bc;border-radius:6px;background:none;color:#c05050;font-family:'Noto Serif SC',serif;font-size:13px;cursor:pointer}.add-form{padding:24px 32px 32px}.form-title{font-family:'Ma Shan Zheng',cursive;font-size:22px;margin-bottom:24px;color:var(--ink)}.form-group{margin-bottom:20px}.form-label{display:block;font-size:11px;letter-spacing:2px;color:var(--ink-faint);text-transform:uppercase;font-family:'Lora',serif;margin-bottom:8px}.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--rule);border-radius:6px;background:rgba(255,255,255,.5);font-family:'Noto Serif SC',serif;font-size:15px;color:var(--ink);outline:none}.form-input:focus{border-color:var(--gold)}.mode-toggle{display:flex;gap:8px}.mode-opt{flex:1;padding:10px 8px;border:1.5px solid var(--rule);border-radius:6px;background:none;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:13px;color:var(--ink-light);text-align:center}.mode-opt.selected{border-color:var(--gold);background:rgba(201,148,42,.1);color:var(--ink)}.mode-opt-icon{font-size:20px;display:block;margin-bottom:4px}.goal-row{display:flex;gap:10px;align-items:center}.goal-row .form-input{flex:1}.goal-unit{font-size:14px;color:var(--ink-faint);white-space:nowrap}.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}.emoji-opt{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--rule);background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}.emoji-opt:hover,.emoji-opt.selected{border-color:var(--gold);background:rgba(201,148,42,.1);transform:scale(1.1)}.color-grid{display:flex;gap:8px;flex-wrap:wrap}.color-opt{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative}.color-opt.selected:after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-size:14px}.color-opt.selected{border-color:var(--ink);transform:scale(1.1)}.save-btn{width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;border-radius:6px;font-family:'Ma Shan Zheng',cursive;font-size:18px;cursor:pointer;margin-top:8px;letter-spacing:2px}.cancel-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:var(--ink-faint);font-family:'Lora',serif;font-style:italic;cursor:pointer}.empty-state{text-align:center;padding:40px 32px;color:var(--ink-faint)}.empty-state-icon{font-size:40px;margin-bottom:12px;display:block}.empty-state-text{font-family:'Lora',serif;font-style:italic;font-size:14px;line-height:1.7}.hidden{display:none!important}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);padding:10px 24px;border-radius:40px;font-family:'Noto Serif SC',serif;font-size:14px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="book">
  <div class="header"><div class="header-label">Daily</div><div class="header-title">打卡本</div><div class="date-badge" id="date-badge"></div></div>
  <div id="view-home" class="active"><div class="section-label">我的习惯</div><div class="scroll-area"><div class="habit-list" id="habit-list"></div></div><button class="add-btn" onclick="showAdd()"><span class="add-btn-icon">+</span>添加新的打卡项目</button><a class="backup-btn" href="./backup.html">数据备份 / 导入导出</a></div>
  <div id="view-detail"><button class="back-btn" onclick="showHome()">← 返回</button><div class="detail-hero"><span class="detail-emoji" id="d-emoji"></span><div class="detail-name" id="d-name"></div><div class="detail-desc" id="d-desc"></div><div class="selected-date-line" id="selected-date-line"></div></div><div class="checkin-area" id="single-area"><button class="checkin-btn" id="checkin-btn" onclick="toggleCheckin()"><span class="checkin-btn-icon" id="checkin-icon"></span><span class="checkin-btn-text" id="checkin-text"></span></button><div class="single-adjust-row"><button class="count-ctrl-btn small minus" onclick="adjustSingleCount(-1)">−</button><span class="single-adjust-note">点大章 +1，点减号修正</span></div><div class="checkin-status" id="checkin-status"></div></div><div class="count-area hidden" id="count-area"><div class="count-display"><button class="count-ctrl-btn minus" onclick="adjustCount(-1)">−</button><div class="count-num-wrap"><div class="count-num" id="count-num">0</div><div class="count-goal-label" id="count-goal-label"></div></div><button class="count-ctrl-btn" onclick="adjustCount(1)">+</button></div><div class="goal-bar-wrap" id="goal-bar-wrap"><div class="goal-bar-track"><div class="goal-bar-fill" id="goal-bar-fill"></div></div><span class="goal-bar-text" id="goal-bar-text"></span></div></div><div class="stats-row"><div class="stat-item"><span class="stat-num" id="stat-streak">0</span><span class="stat-label">连续天数</span></div><div class="stat-item"><span class="stat-num" id="stat-total">0</span><span class="stat-label" id="stat-total-label">累计次数</span></div><div class="stat-item"><span class="stat-num" id="stat-rate">0%</span><span class="stat-label">本月完成率</span></div></div><div class="calendar-section"><div class="calendar-title calendar-title-row"><button class="month-nav" onclick="changeCalendarMonth(-1)">‹</button><span id="calendar-title-text">本月记录</span><button class="month-nav" id="next-month-btn" onclick="changeCalendarMonth(1)">›</button></div><div class="calendar-grid" id="calendar-grid"></div></div><div class="divider"></div><button class="delete-btn" onclick="deleteHabit()">✕ 删除这个打卡项目</button></div>
  <div id="view-add"><div class="add-form"><div class="form-title">新建打卡项目</div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="input-name" type="text" placeholder="例如：早起、喝水、运动…" maxlength="20"></div><div class="form-group"><label class="form-label">备注（可选）</label><input class="form-input" id="input-desc" type="text" placeholder="简短说明" maxlength="30"></div><div class="form-group"><label class="form-label">打卡类型</label><div class="mode-toggle"><button class="mode-opt selected" id="mode-single" onclick="selectMode('single')"><span class="mode-opt-icon">✓</span>单次打卡</button><button class="mode-opt" id="mode-count" onclick="selectMode('count')"><span class="mode-opt-icon">🔢</span>次数打卡</button></div></div><div class="form-group hidden" id="goal-group"><label class="form-label">每日目标次数（可选）</label><div class="goal-row"><input class="form-input" id="input-goal" type="number" min="1" max="999" placeholder="例如：8"><span class="goal-unit">次 / 天</span></div></div><div class="form-group"><label class="form-label">选择图标</label><div class="emoji-grid" id="emoji-grid"></div></div><div class="form-group"><label class="form-label">主题色</label><div class="color-grid" id="color-grid"></div></div><button class="save-btn" onclick="saveHabit()">记 录 它</button><span class="cancel-link" onclick="showHome()">取消</span></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const EMOJIS=['🌅','📚','💧','🏃','🧘','✍️','🎵','🌱','💪','🥗','😴','🧹','📝','🎨','🌙','☕','🚶','🍎','💊','🧴','🌸','🔥','⭐','🎯','🦷','🧠','🏊','🎸'];
const COLORS=['#6bab7a','#a8c97f','#4ecda4','#88c9a1','#b5d99c','#f9c6c9','#f4a7b9','#c9b8e8','#a8c8e8','#b8d4f0','#ffd6a5','#ffc8a2','#c9942a','#5b7fa6','#4a7c59','#2c8c7c'];
let habits=[];try{habits=JSON.parse(localStorage.getItem('habits')||'[]');if(!Array.isArray(habits))habits=[]}catch{habits=[]}
let currentHabitId=null,selectedEmoji=EMOJIS[0],selectedColor=COLORS[0],selectedMode='single',selectedDate=todayStr(),calendarMonth=monthStartStr(todayStr());
habits=habits.map(normalizeHabit);save();
function normalizeHabit(h){if(!h||typeof h!=='object')h={};if(!h.id)h.id=Date.now().toString()+Math.random().toString(16).slice(2);if(!h.name)h.name='未命名项目';if(!h.mode)h.mode='single';if(!h.records)h.records=[];if(!h.countRecords)h.countRecords={};h.records.forEach(day=>{if(!h.countRecords[day])h.countRecords[day]=1});return h}
function dateToStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function todayStr(){return dateToStr(new Date())}
function monthStartStr(s){return s.slice(0,7)+'-01'}
function isFutureDate(s){return parseDate(s)>parseDate(todayStr())}
function dateLabel(s){if(s===todayStr())return'今天';const d=parseDate(s);return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
function save(){localStorage.setItem('habits',JSON.stringify(habits))}
function getDayCount(h,day){const c=(h.countRecords||{})[day]||0;if(c>0)return c;return(h.records||[]).includes(day)?1:0}
function setDayCount(h,day,count){if(!h.countRecords)h.countRecords={};if(!h.records)h.records=[];if(count<=0){delete h.countRecords[day];h.records=h.records.filter(d=>d!==day)}else{h.countRecords[day]=count;if(!h.records.includes(day))h.records.push(day);h.records.sort()}}
function addDayCount(h,day,delta){const next=Math.max(0,getDayCount(h,day)+delta);setDayCount(h,day,next);return next}
function showView(v){['view-home','view-detail','view-add'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById(v).classList.add('active')}
function showHome(){renderHome();showView('view-home')}
function showAdd(){document.getElementById('input-name').value='';document.getElementById('input-desc').value='';document.getElementById('input-goal').value='';selectedEmoji=EMOJIS[0];selectedColor=COLORS[0];selectedMode='single';document.getElementById('mode-single').classList.add('selected');document.getElementById('mode-count').classList.remove('selected');document.getElementById('goal-group').classList.add('hidden');renderEmojiGrid();renderColorGrid();showView('view-add')}
function showDetail(id){currentHabitId=id;selectedDate=todayStr();calendarMonth=monthStartStr(selectedDate);renderDetail();showView('view-detail')}
function renderHome(){const list=document.getElementById('habit-list');if(!habits.length){list.innerHTML='<div class="empty-state"><span class="empty-state-icon">📓</span><div class="empty-state-text">还没有打卡项目<br>点击下方按钮开始记录你的习惯吧</div></div>';return}list.innerHTML=habits.map(h=>{const today=todayStr(),streak=calcStreak(h),dots=getLast7(h).map(v=>`<div class="streak-dot${v?' filled':''}"></div>`).join(''),cnt=getDayCount(h,today),goal=h.goal||0;if(h.mode==='count'){const color=cnt>0?h.color:'var(--ink-faint)';return`<div class="habit-card" onclick="showDetail('${h.id}')"><div class="habit-icon-wrap" style="background:${h.color}18;border-color:${h.color}55">${h.emoji||'✓'}</div><div class="habit-info"><div class="habit-name">${escapeHtml(h.name)}</div><div class="streak-dots">${dots}</div><div class="habit-sub">${streak>0?`连续 ${streak} 天`:'今天还没记录'}</div></div><div class="card-count"><div class="card-count-num" style="color:${color}">${cnt}</div><div class="card-count-unit">${goal?`目标${goal}次`:'次'}</div></div></div>`}const done=cnt>0;return`<div class="habit-card" onclick="showDetail('${h.id}')"><div class="habit-icon-wrap" style="background:${h.color}18;border-color:${h.color}55">${h.emoji||'✓'}</div><div class="habit-info"><div class="habit-name">${escapeHtml(h.name)}</div><div class="streak-dots">${dots}</div><div class="habit-sub">${streak>0?`连续 ${streak} 天`:'今天还没打卡'}</div></div><div class="card-stamp ${done?'done':'undone'}">${done?cnt:'○'}</div></div>`}).join('')}
function renderDetail(){const h=habits.find(x=>x.id===currentHabitId);if(!h)return;const day=selectedDate||todayStr();document.getElementById('d-emoji').textContent=h.emoji||'✓';document.getElementById('d-name').textContent=h.name;document.getElementById('d-desc').textContent=h.desc||'每天坚持，成就更好的自己';document.getElementById('selected-date-line').textContent=`当前编辑：${dateLabel(day)}`;const sa=document.getElementById('single-area'),ca=document.getElementById('count-area');if(h.mode==='count'){sa.classList.add('hidden');ca.classList.remove('hidden');renderCountArea(h)}else{ca.classList.add('hidden');sa.classList.remove('hidden');const cnt=getDayCount(h,day),done=cnt>0,btn=document.getElementById('checkin-btn');document.getElementById('checkin-icon').textContent=done?cnt:(h.emoji||'✓');document.getElementById('checkin-text').textContent=done?'再记一次':'打 卡';btn.className='checkin-btn '+(done?'done':'undone');btn.style.borderColor=done?'#4a7c59':h.color;btn.style.color=done?'#4a7c59':h.color;document.getElementById('checkin-status').textContent=done?`${dateLabel(day)}已记录 ${cnt} 次`:`点击记录${dateLabel(day)}`}document.getElementById('stat-total-label').textContent='累计次数';document.getElementById('stat-total').textContent=calcTotalCount(h);document.getElementById('stat-streak').textContent=calcStreak(h,day);document.getElementById('stat-rate').textContent=calcMonthRate(h)+'%';renderCalendar(h)}
function renderCountArea(h){const day=selectedDate||todayStr(),cnt=getDayCount(h,day),goal=h.goal||0,num=document.getElementById('count-num');num.textContent=cnt;num.style.color=cnt>0?h.color:'var(--ink-faint)';document.getElementById('count-goal-label').textContent=goal?`目标 ${goal} 次`:'次';const wrap=document.getElementById('goal-bar-wrap');if(goal){wrap.classList.remove('hidden');const pct=Math.min(cnt/goal*100,100),fill=document.getElementById('goal-bar-fill');fill.style.width=pct+'%';fill.style.background=pct>=100?'#4a7c59':h.color;document.getElementById('goal-bar-text').textContent=pct>=100?'🎉 已达成当天目标！':`还差 ${goal-cnt} 次`}else wrap.classList.add('hidden')}
function adjustCount(delta){const h=habits.find(x=>x.id===currentHabitId);if(!h||h.mode!=='count')return;const day=selectedDate||todayStr();if(isFutureDate(day)){showToast('不能记录未来日期');return}const next=addDayCount(h,day,delta);save();if(delta>0){const goal=h.goal||0;if(goal&&next===goal)showToast((h.emoji||'✓')+' 达成当天目标！🎉');else showToast(`+1  ${dateLabel(day)}已记录 ${next} 次`);bumpCountNumber()}else showToast(`${dateLabel(day)}已调整为 ${next} 次`);renderDetail();renderHome()}
function bumpCountNumber(){const num=document.getElementById('count-num');if(!num)return;num.classList.remove('bump');void num.offsetWidth;num.classList.add('bump');setTimeout(()=>num.classList.remove('bump'),200)}
function renderCalendar(h){const grid=document.getElementById('calendar-grid'),base=parseDate(calendarMonth||monthStartStr(todayStr())),year=base.getFullYear(),month=base.getMonth(),today=todayStr(),days=new Date(year,month+1,0).getDate(),firstDay=new Date(year,month,1).getDay(),goal=h.goal||0;document.getElementById('calendar-title-text').textContent=`${year}年${month+1}月记录`;const currentMonth=today.slice(0,7),viewingMonth=`${year}-${String(month+1).padStart(2,'0')}`;document.getElementById('next-month-btn').disabled=viewingMonth>=currentMonth;let html='';['日','一','二','三','四','五','六'].forEach(d=>html+=`<div class="cal-day" style="font-size:9px;color:var(--ink-faint)">${d}</div>`);for(let i=0;i<firstDay;i++)html+='<div></div>';for(let d=1;d<=days;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cnt=getDayCount(h,ds),future=isFutureDate(ds);let cls='cal-day',badge='';if(!future)cls+=' clickable';if(future)cls+=' future';if(ds===selectedDate)cls+=' selected';if(cnt>0){if(h.mode==='count'&&goal)cls+=cnt>=goal?' checked':' partial';else cls+=' checked';if(cnt>1)badge=`<span class="cal-cnt">${cnt}</span>`}if(ds===today)cls+=' today-dot';const click=future?'':`onclick="selectCalendarDate('${ds}')"`;html+=`<div class="${cls}" ${click}>${d}${badge}</div>`}grid.innerHTML=html}
function selectCalendarDate(ds){if(isFutureDate(ds)){showToast('不能选择未来日期');return}selectedDate=ds;calendarMonth=monthStartStr(ds);renderDetail()}
function changeCalendarMonth(delta){const base=parseDate(calendarMonth||monthStartStr(todayStr()));base.setMonth(base.getMonth()+delta);const target=dateToStr(base),targetMonth=target.slice(0,7),currentMonth=todayStr().slice(0,7);calendarMonth=targetMonth>currentMonth?monthStartStr(todayStr()):monthStartStr(target);renderDetail()}
function toggleCheckin(){const h=habits.find(x=>x.id===currentHabitId);if(!h)return;const day=selectedDate||todayStr();if(isFutureDate(day)){showToast('不能记录未来日期');return}const next=addDayCount(h,day,1);save();showToast(`${h.emoji||'✓'} ${dateLabel(day)}已记录 ${next} 次`);renderDetail();renderHome()}
function adjustSingleCount(delta){const h=habits.find(x=>x.id===currentHabitId);if(!h||h.mode==='count')return;const day=selectedDate||todayStr();if(isFutureDate(day)){showToast('不能记录未来日期');return}const next=addDayCount(h,day,delta);save();showToast(`${dateLabel(day)}已调整为 ${next} 次`);renderDetail();renderHome()}
function saveHabit(){const name=document.getElementById('input-name').value.trim();if(!name){showToast('请输入名称 ✏️');return}const goal=parseInt(document.getElementById('input-goal').value)||0;habits.push({id:Date.now().toString(),name,desc:document.getElementById('input-desc').value.trim(),emoji:selectedEmoji,color:selectedColor,mode:selectedMode,goal:selectedMode==='count'?goal:0,records:[],countRecords:{},createdAt:todayStr()});save();showToast('已添加：'+name+' 🎉');showHome()}
function deleteHabit(){const h=habits.find(x=>x.id===currentHabitId);if(!h)return;if(!confirm(`确定要删除「${h.name}」吗？所有记录将清空。`))return;habits=habits.filter(x=>x.id!==currentHabitId);save();showToast('已删除');showHome()}
function selectMode(m){selectedMode=m;document.getElementById('mode-single').classList.toggle('selected',m==='single');document.getElementById('mode-count').classList.toggle('selected',m==='count');document.getElementById('goal-group').classList.toggle('hidden',m!=='count')}
function renderEmojiGrid(){document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>`<button class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</button>`).join('')}
function renderColorGrid(){document.getElementById('color-grid').innerHTML=COLORS.map(c=>`<div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')}
function selectEmoji(e){selectedEmoji=e;renderEmojiGrid()}function selectColor(c){selectedColor=c;renderColorGrid()}
function calcStreak(h,fromDate=todayStr()){let streak=0,d=parseDate(fromDate);while(true){const s=dateToStr(d),hit=getDayCount(h,s)>0;if(hit){streak++;d.setDate(d.getDate()-1)}else break}return streak}
function getLast7(h){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return getDayCount(h,dateToStr(d))>0})}
function calcMonthRate(h){const base=parseDate(calendarMonth||monthStartStr(todayStr())),year=base.getFullYear(),month=base.getMonth(),today=parseDate(todayStr()),isCurrentMonth=year===today.getFullYear()&&month===today.getMonth(),endDay=isCurrentMonth?today.getDate():new Date(year,month+1,0).getDate(),goal=h.goal||1;let count=0;for(let d=1;d<=endDay;d++){const s=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,dayCount=getDayCount(h,s),hit=h.mode==='count'?dayCount>=goal:dayCount>0;if(hit)count++}return Math.round(count/endDay*100)}
function calcTotalCount(h){return Object.values(h.countRecords||{}).reduce((a,b)=>a+Number(b||0),0)}
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
const _n=new Date(),_mo=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],_dy=['日','一','二','三','四','五','六'];document.getElementById('date-badge').textContent=`${_n.getFullYear()} · ${_mo[_n.getMonth()]} · 周${_dy[_n.getDay()]}`;renderEmojiGrid();renderColorGrid();showHome();
</script>
</body>
