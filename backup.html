<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>打卡本 · 数据备份</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e8;
    --ink: #2c2416;
    --ink-light: #6b5c42;
    --ink-faint: #b0a090;
    --gold: #c9942a;
    --green: #4a7c59;
    --rule: #d4c9b4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
  }

  body {
    background: #d4c8b0;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(0,0,0,0.015) 40px, rgba(0,0,0,0.015) 41px);
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  .book {
    width: 100%;
    max-width: 480px;
    background: var(--paper);
    border-radius: 4px 12px 12px 4px;
    box-shadow: -6px 0 0 #b8a888, -10px 0 0 #a89870, 0 8px 40px rgba(0,0,0,0.25), inset 0 0 80px rgba(200,180,140,0.15);
    position: relative;
    overflow: hidden;
    padding: 32px;
  }

  .book::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(transparent, transparent 31px, var(--rule) 31px, var(--rule) 32px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  .label {
    font-family: 'Lora', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--ink-faint);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 38px;
    text-align: center;
    margin-bottom: 10px;
  }

  .desc {
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.8;
    text-align: center;
    margin-bottom: 24px;
  }

  .status {
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.35);
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.7;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  button, a.button {
    display: block;
    width: 100%;
    padding: 13px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--rule);
    background: rgba(255,255,255,0.45);
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    touch-action: manipulation;
  }

  button.primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 19px;
    letter-spacing: 2px;
  }

  button.danger {
    color: #c05050;
    border-color: #e8c0bc;
  }

  button:hover, a.button:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  button.primary:hover {
    color: var(--paper);
    background: var(--ink-light);
  }

  input[type="file"] { display: none; }

  .note {
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-faint);
    line-height: 1.8;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 24px;
    border-radius: 40px;
    font-size: 14px;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="book">
    <div class="content">
      <div class="label">Daily Tracker</div>
      <h1>数据备份</h1>
      <p class="desc">这里和打卡本主页面使用同一份浏览器本地数据。可以把当前数据导出成 JSON 文件，也可以从 JSON 文件恢复数据。</p>

      <div class="status" id="status"></div>

      <div class="actions">
        <button class="primary" onclick="exportData()">导出数据</button>
        <button onclick="document.getElementById('import-file').click()">导入数据</button>
        <input id="import-file" type="file" accept="application/json,.json" onchange="importData(event)">
        <a class="button" href="./">返回打卡本</a>
        <button class="danger" onclick="clearLocalData()">清空本机数据</button>
      </div>

      <p class="note">导入会覆盖当前浏览器里的打卡数据。建议导入前先导出一份当前备份。</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadHabits() {
  try {
    const data = JSON.parse(localStorage.getItem('habits') || '[]');
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

function normalizeHabits(list) {
  return list.map(h => {
    if (!h || typeof h !== 'object') return null;
    if (!h.id) h.id = Date.now().toString() + Math.random().toString(16).slice(2);
    if (!h.name) h.name = '未命名项目';
    if (!h.mode) h.mode = 'single';
    if (!h.records) h.records = [];
    if (!h.countRecords) h.countRecords = {};
    h.records.forEach(day => {
      if (!h.countRecords[day]) h.countRecords[day] = 1;
    });
    return h;
  }).filter(Boolean);
}

function saveHabits(list) {
  localStorage.setItem('habits', JSON.stringify(normalizeHabits(list)));
}

function updateStatus() {
  const habits = loadHabits();
  const totalDays = habits.reduce((sum, h) => {
    const days = new Set([...(h.records || []), ...Object.keys(h.countRecords || {})]);
    return sum + days.size;
  }, 0);
  const totalCount = habits.reduce((sum, h) => {
    return sum + Object.values(h.countRecords || {}).reduce((a, b) => a + Number(b || 0), 0);
  }, 0);

  document.getElementById('status').innerHTML = `
    当前浏览器里有 <strong>${habits.length}</strong> 个打卡项目。<br>
    已记录 <strong>${totalDays}</strong> 个日期，累计 <strong>${totalCount}</strong> 次。
  `;
}

function exportData() {
  const habits = normalizeHabits(loadHabits());
  const payload = {
    app: 'dailytracker',
    version: 2,
    exportedAt: new Date().toISOString(),
    habits
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dailytracker-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  showToast('已导出备份文件');
}

async function importData(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const importedHabits = Array.isArray(data)
      ? data
      : Array.isArray(data.habits)
        ? data.habits
        : null;

    if (!importedHabits) throw new Error('Invalid backup file');

    const ok = confirm(`导入会覆盖当前浏览器里的打卡数据。确定导入 ${importedHabits.length} 个项目吗？`);
    if (!ok) return;

    saveHabits(importedHabits);
    updateStatus();
    showToast(`已导入 ${importedHabits.length} 个项目`);
  } catch (err) {
    console.error(err);
    showToast('导入失败：文件格式不对');
  } finally {
    event.target.value = '';
  }
}

function clearLocalData() {
  const ok = confirm('确定清空当前浏览器里的所有打卡数据吗？建议先导出备份。');
  if (!ok) return;
  localStorage.removeItem('habits');
  updateStatus();
  showToast('已清空本机数据');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

updateStatus();
</script>
</body>
</html>
