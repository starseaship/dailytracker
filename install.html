<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>打卡本</title>
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="打卡本">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=2">
<style>
:root{--paper:#f5f0e8;--ink:#2c2416;--ink-light:#6b5c42;--ink-faint:#b0a090;--gold:#c9942a;--rule:#d4c9b4}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#d4c8b0;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(0,0,0,.015) 40px,rgba(0,0,0,.015) 41px);font-family:'Noto Serif SC',serif;color:var(--ink);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}.book{width:100%;max-width:480px;background:var(--paper);border-radius:4px 12px 12px 4px;box-shadow:-6px 0 0 #b8a888,-10px 0 0 #a89870,0 8px 40px rgba(0,0,0,.25),inset 0 0 80px rgba(200,180,140,.15);padding:32px;text-align:center}.icon{width:96px;height:96px;border-radius:22px;margin:0 auto 18px;display:block;box-shadow:0 8px 24px rgba(0,0,0,.18)}.label{font-size:11px;letter-spacing:4px;color:var(--ink-faint);text-transform:uppercase;margin-bottom:6px}h1{font-family:'Ma Shan Zheng',cursive;font-size:40px;line-height:1;margin-bottom:14px}.desc{font-size:14px;line-height:1.9;color:var(--ink-light);margin-bottom:22px}.steps{text-align:left;border:1px solid var(--rule);border-radius:8px;padding:16px;background:rgba(255,255,255,.35);font-size:14px;line-height:2;color:var(--ink-light);margin-bottom:16px}.button{display:block;width:100%;padding:13px 14px;border-radius:8px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);text-decoration:none;font-size:16px;font-family:'Ma Shan Zheng',cursive;letter-spacing:2px}.note{font-size:12px;line-height:1.8;color:var(--ink-faint);margin-top:14px}</style>
</head>
<body>
<div class="book">
<img class="icon" src="./apple-touch-icon.png?v=2" alt="打卡本图标">
<div class="label">Daily Tracker</div>
<h1>打卡本</h1>
<p class="desc">从这个页面添加到 iOS 主屏幕，会使用新的打卡本 LOGO。</p>
<div class="steps">
1. 点 Safari 分享按钮。<br>
2. 选择“添加到主屏幕”。<br>
3. 名称保持“打卡本”。<br>
4. 以后从桌面图标打开，会进入打卡本。
</div>
<a class="button" href="./">先进入打卡本</a>
<p class="note">如果你已经添加过旧图标，需要先删除旧桌面图标，再从此页面重新添加。</p>
</div>
<script>
if (window.navigator.standalone) {
  location.replace('./');
}
</script>
</body>
</html>
